spring.application.name=demo

# DataSource Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/clm_platform}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.postgresql.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:clm_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:clm_password}

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:none}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.defer-datasource-initialization=false
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=true

# Hibernate Schema Configuration - use contracts schema
spring.jpa.properties.hibernate.default_schema=contracts

# Flyway Configuration - DISABLED AUTO-CONFIG DUE TO CIRCULAR DEPENDENCY WITH JPA
# Manual bean configuration handles Flyway initialization
spring.flyway.enabled=false
